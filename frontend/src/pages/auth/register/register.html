<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Food Store</title>
    <link rel="stylesheet" href="/src/style.css">
    <style>
        .login-body { display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%); font-family: 'Segoe UI', sans-serif; }
        .login-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
        .login-title { text-align: center; color: #2c3e50; margin-bottom: 25px; font-size: 2rem; margin-top:0; }
        .custom-input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .btn-auth { width: 100%; padding: 12px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; border: none; background-color: #3498db; color: white; margin-bottom: 10px; transition: 0.3s;}
        .btn-auth:hover { background-color: #2980b9; transform: translateY(-2px); }
        .link-login { display: block; text-align: center; color: #3498db; text-decoration: none; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body class="login-body">
    <div class="login-container">
        <h2 class="login-title">Crear Cuenta</h2>
        <form id="register-form">
            <input type="text" id="reg-nombre" class="custom-input" required placeholder="Nombre">
            <input type="text" id="reg-apellido" class="custom-input" required placeholder="Apellido">
            <input type="email" id="reg-email" class="custom-input" required placeholder="Correo Electrónico">
            <input type="password" id="reg-pass" class="custom-input" required placeholder="Contraseña">
            
            <button type="button" id="btn-do-register" class="btn-auth">Registrarse</button>
        </form>
        <a href="/src/pages/auth/login/login.html" class="link-login">Ya tengo cuenta. Volver al Login</a>
    </div>
    <script type="module" src="./register.ts"></script>
</body>
</html>
