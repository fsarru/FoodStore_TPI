<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestionar Productos</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body class="admin-body">
    <div class="admin-wrapper">
        <aside class="sidebar">
            <h2>Admin Panel</h2>
            <nav>
                <a href="/src/pages/admin/adminHome/adminHome.html">Dashboard</a>
                <a href="/src/pages/admin/categories/categorias.html">Categorías</a>
                <a href="/src/pages/admin/products/productos.html" style="color: #e67e22;">Productos</a>
                <a href="/src/pages/admin/orders/pedidos.html">Pedidos</a>
            </nav>
        </aside>
        <main class="admin-content">
            <h1>Productos</h1>
            <button id="btn-add-product" class="btn-base">Nuevo Producto</button>
<table class="admin-table">
    <thead>
        <tr><th>ID</th><th>Imagen</th><th>Nombre</th><th>Descripción</th><th>Precio</th><th>Stock</th><th>Categoría</th><th>Estado</th><th>Acciones</th></tr>
    </thead>
    <tbody id="product-table-body"></tbody>
</table>
        </main>
    </div>
    <script type="module" src="./productos.ts"></script>

<div id="modal-producto" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000;">
    <div style="background:white; width:400px; margin:100px auto; padding:20px; border-radius:8px;">
        <h2>Nuevo Producto</h2>
        <form id="form-producto">
    <input type="text" id="p-nombre" placeholder="Nombre" required style="width:100%; margin-bottom:10px;" class="custom-input">
    <textarea id="p-descripcion" placeholder="Descripción del producto" required style="width:100%; margin-bottom:10px; font-family:inherit" class="custom-input"></textarea>
    
    <input type="number" id="p-precio" placeholder="Precio" min="0.01" step="0.01" required style="width:100%; margin-bottom:10px;" class="custom-input">
    <input type="number" id="p-stock" placeholder="Stock" min="0" required style="width:100%; margin-bottom:10px;" class="custom-input">
    
    <input type="text" id="p-imagen" placeholder="URL de la imagen" required style="width:100%; margin-bottom:10px;" class="custom-input">
    <select id="categoria-select" class="custom-input" required style="width:100%; margin-bottom:15px;"></select>
    
    <button type="submit" class="btn-base" style="width:100%; margin-bottom:5px;">Guardar Producto</button>
    <button type="button" class="btn-registro" style="width:100%;" onclick="document.getElementById('modal-producto').style.display='none'">Cancelar</button>
</form>
        <input type="hidden" id="p-id-edit" value="">
    </div>
</div>


</body>
</html>
