<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestionar Productos</title>
    <link rel="stylesheet" href="/src/style.css">
    <style>
        .custom-input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    </style>
</head>
<body class="admin-body">
    <div class="admin-wrapper">
        <aside class="sidebar">
            <h2>Admin Panel</h2>
            <nav>
                <a href="/src/pages/admin/adminHome/adminHome.html">Dashboard</a>
                <a href="/src/pages/admin/categories/categorias.html">Categorías</a>
                <a href="/src/pages/admin/products/productos.html" style="color: #e67e22;">Productos</a>
                <a href="/src/pages/admin/orders/pedidos.html">Pedidos</a>
            </nav>
            <button id="logoutButton" style="width: 100%; margin-top: 20px; background: #e74c3c; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold;">Cerrar Sesión</button>
        </aside>
        
        <main class="admin-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1 style="margin: 0;">Productos</h1>
                <button id="btn-add-product" class="btn-base" style="background: #27ae60; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold;">+ Nuevo Producto</button>
            </div>
            
            <table class="admin-table">
                <thead>
                    <tr><th>ID</th><th>Imagen</th><th>Nombre</th><th>Descripción</th><th>Precio</th><th>Stock</th><th>Categoría</th><th>Estado</th><th>Acciones</th></tr>
                </thead>
                <tbody id="product-table-body"></tbody>
            </table>
        </main>
    </div>

    <div id="modal-producto" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:white; width:450px; max-width:90%; padding:30px; border-radius:12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
            <h2 style="margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; color: #2c3e50;">Producto</h2>
            <form id="form-producto" style="display: flex; flex-direction: column; gap: 10px;">
                <input type="text" id="p-nombre" placeholder="Nombre" required class="custom-input">
                <textarea id="p-descripcion" placeholder="Descripción del producto" required style="font-family:inherit; min-height: 60px; resize: vertical;" class="custom-input"></textarea>
                
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="p-precio" placeholder="Precio ($)" min="0.01" step="0.01" required class="custom-input">
                    <input type="number" id="p-stock" placeholder="Stock" min="0" required class="custom-input">
                </div>
                
                <select id="categoria-select" class="custom-input" required></select>
                <input type="text" id="p-imagen" placeholder="URL de la imagen" required class="custom-input">
                
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button type="button" class="btn-registro" style="flex:1; padding: 10px; border-radius: 6px; border:none; background:#ccc; cursor:pointer; font-weight:bold;" onclick="document.getElementById('modal-producto').style.display='none'">Cancelar</button>
                    <button type="submit" class="btn-base" style="flex:1; padding: 10px; border-radius: 6px; border:none; background:#3498db; color:white; font-weight:bold; cursor:pointer;">Guardar</button>
                </div>
            </form>
            <input type="hidden" id="p-id-edit" value="">
        </div>
    </div>

    <script type="module" src="./productos.ts"></script>
</body>
</html>
