<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestionar Categorías</title>
    <link rel="stylesheet" href="/src/style.css">
    <style>
        .custom-input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    </style>
</head>

<body class="admin-body">
    <div class="admin-wrapper">
        <aside class="sidebar">
            <h2>Admin Panel</h2>
            <nav>
                <a href="/src/pages/admin/adminHome/adminHome.html">Dashboard</a>
                <a href="/src/pages/admin/categories/categorias.html" style="color: #e67e22;">Categorías</a>
                <a href="/src/pages/admin/products/productos.html">Productos</a>
                <a href="/src/pages/admin/orders/pedidos.html">Pedidos</a>
            </nav>
            <button id="logoutButton" style="width: 100%; margin-top: 20px; background: #e74c3c; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold;">Cerrar Sesión</button>
        </aside>
        
        <main class="admin-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1 style="margin: 0;">Categorías</h1>
                <button id="btn-add-category" class="btn-base" style="background: #27ae60; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold;">+ Nueva Categoría</button>
            </div>
            
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Imagen</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Acciones</th> 
                    </tr>
                </thead>
                <tbody id="cat-table-body"></tbody>
            </table>
        </main>
    </div>

    <div id="modal-categoria" class="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000;">
        <div style="background:white; padding:30px; border-radius:12px; width:400px; max-width:90%; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
            <h3 id="modal-title" style="margin-top:0; color:#2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px;">Categoría</h3>
            
            <form id="form-categoria" style="display: flex; flex-direction: column; gap: 15px;">
                <input type="hidden" id="c-id-edit">
                <input type="text" id="c-nombre" placeholder="Nombre de la categoría" class="custom-input" required>
                <input type="text" id="c-desc" placeholder="Descripción" class="custom-input" required>
                <input type="url" id="c-imagen" placeholder="URL de la imagen" class="custom-input">
                
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button type="button" onclick="document.getElementById('modal-categoria').style.display='none'" style="flex:1; padding:10px; border:none; background:#ccc; border-radius:6px; cursor:pointer; font-weight:bold;">Cancelar</button>
                    <button type="submit" style="flex:1; padding:10px; border:none; background:#3498db; color:white; font-weight:bold; border-radius:6px; cursor:pointer;">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="./categorias.ts"></script>
</body>
</html>
